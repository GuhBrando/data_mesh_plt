name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 8 * * 1"

jobs:
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-lint-python:
    name: Python Security Lint (bandit)
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Run bandit (medium+ severity blocks merge)
        run: uv run bandit -r backend/ -ll

  security-lint-react:
    name: React Security Lint (eslint-plugin-security)
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint security rules
        run: npm run lint
        working-directory: frontend

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    needs: secret-scan
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - run: uv sync --extra dev

      - name: Python dependency audit (all known CVEs)
        run: uv run pip-audit

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Node dependency audit (high/critical only)
        run: npm audit --audit-level=high
        working-directory: frontend
