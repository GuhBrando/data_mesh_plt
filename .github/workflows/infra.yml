name: Infra (Terraform)

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.5"
  # CI covers the platform stack only. The data_plane stack requires a one-time
  # manual Databricks account-admin grant, so it is applied manually (see README).
  WORKDIR: infra/terraform/platform
  # Reuses the same AZURE_CREDENTIALS service-principal JSON as cd.yml.
  ARM_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  TF_VAR_subscription_id: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}
  TF_VAR_tenant_id: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        working-directory: ${{ env.WORKDIR }}
        run: terraform fmt -check -recursive

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Validate
        working-directory: ${{ env.WORKDIR }}
        run: terraform validate

      - name: Plan
        working-directory: ${{ env.WORKDIR }}
        run: terraform plan -input=false -no-color

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: infra-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Apply
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -auto-approve
