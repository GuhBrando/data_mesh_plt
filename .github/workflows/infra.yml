name: Infra (Terraform)

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # Required by OIDC: lets the job request the GitHub token Azure trusts.
  id-token: write

env:
  TF_VERSION: "1.9.5"
  # CI covers the platform stack only. The data_plane stack requires a one-time
  # manual Databricks account-admin grant, so it is applied manually (see README).
  WORKDIR: infra/terraform/platform
  # Authenticates as the dmplt-devops SP via OIDC — no secret. The federated
  # credentials (pull_request + main) live in the identities module; its standing
  # permissions come from infra/terraform/platform/grant-ci-permissions.sh.
  # These are identifiers, not secrets.
  ARM_CLIENT_ID: d49bff07-6720-4b5e-b962-c16c8e327f43
  ARM_TENANT_ID: 02589359-ab33-4ac8-a14d-396cc39943ae
  ARM_SUBSCRIPTION_ID: ff0bf8b0-bff5-4b7e-a36e-d853ac35ec1a
  ARM_USE_OIDC: "true"
  TF_VAR_subscription_id: ff0bf8b0-bff5-4b7e-a36e-d853ac35ec1a
  TF_VAR_tenant_id: 02589359-ab33-4ac8-a14d-396cc39943ae

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        working-directory: ${{ env.WORKDIR }}
        run: terraform fmt -check -recursive

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Validate
        working-directory: ${{ env.WORKDIR }}
        run: terraform validate

      - name: Plan
        working-directory: ${{ env.WORKDIR }}
        run: terraform plan -input=false -no-color

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: infra-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Apply
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -auto-approve
