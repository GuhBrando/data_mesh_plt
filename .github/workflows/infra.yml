name: Infra (Terraform)

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # Required by OIDC: lets the job request the GitHub token Azure trusts.
  id-token: write

env:
  TF_VERSION: "1.9.5"
  # CI covers the platform stack only. The data_plane stack requires a one-time
  # manual Databricks account-admin grant, so it is applied manually (see README).
  WORKDIR: infra/terraform/platform
  # Authenticates as the dmplt-devops SP via OIDC — no secret. The federated
  # credentials (pull_request + main) live in the identities module. The repository
  # variables below AND the SP's standing permissions are both provisioned by
  # infra/terraform/platform/grant-ci-permissions.sh.
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}

jobs:
  plan:
    name: Validate & Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        working-directory: ${{ env.WORKDIR }}
        run: terraform fmt -check -recursive

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Validate
        working-directory: ${{ env.WORKDIR }}
        run: terraform validate

      - name: Plan
        working-directory: ${{ env.WORKDIR }}
        run: terraform plan -input=false -no-color

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: infra-apply
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ env.WORKDIR }}
        run: terraform init

      - name: Apply
        working-directory: ${{ env.WORKDIR }}
        run: terraform apply -input=false -auto-approve
