name: CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: dmplt-rg
  ACR_LOGIN_SERVER: dmpltacr.azurecr.io
  BACKEND_APP_NAME: dmplt-ca-backend
  CAE_DOMAIN: jollyfield-6ed7e557.westus2.azurecontainerapps.io
  DB_HOST: ${{ secrets.DB_HOST }}
  DB_USER: admin
  DB_NAME: data_mesh_plt
  MIGRATIONS_DB_HOST: ep-divine-wind-aksyjv4m.c-3.us-west-2.aws.neon.tech
  DB_PORT: "5432"

jobs:
  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/backend:${{ github.ref_name }}
            ${{ env.ACR_LOGIN_SERVER }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ""
          skip_app_build: true

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Container App secrets
        run: |
          az containerapp secret set \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets \
              "postgres-password=${{ secrets.POSTGRES_PASSWORD }}" \
              "admin-password=${{ secrets.ADMIN_PASSWORD }}" \
              "app-user-password=${{ secrets.APP_USER_PASSWORD }}" \
              "user-password=${{ secrets.USER_PASSWORD }}" \
              "jwt-secret-key=${{ secrets.JWT_SECRET_KEY }}" \
              "github-token=${{ secrets.GH_CONTRACT_TOKEN }}"

      - name: Update Container App with new image
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          az containerapp update \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/backend:$IMAGE_TAG" \
            --set-env-vars \
              "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
              "DB_HOST=${{ env.DB_HOST }}" \
              "DB_PORT=${{ env.DB_PORT }}" \
              "DB_USER=${{ env.DB_USER }}" \
              "DB_NAME=${{ env.DB_NAME }}" \
              "MIGRATIONS_DB_HOST=${{ env.MIGRATIONS_DB_HOST }}" \
              "POSTGRES_PASSWORD=secretref:postgres-password" \
              "ADMIN_PASSWORD=secretref:admin-password" \
              "APP_USER_PASSWORD=secretref:app-user-password" \
              "USER_PASSWORD=secretref:user-password" \
              "JWT_SECRET_KEY=secretref:jwt-secret-key" \
              "GITHUB_TOKEN=secretref:github-token"

      - name: Configure CORS
        run: |
          az containerapp ingress cors update \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --allowed-origins "${{ secrets.CORS_ORIGINS }}" \
            --allowed-methods "*" \
            --allowed-headers "*" \
            --allow-credentials true
