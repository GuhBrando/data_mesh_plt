repos:
  # ── File hygiene ────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict

  # ── Python: lint + format (ruff covers C90 complexity, ASYNC, SIM, etc.) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ── Python: security lint (mirrors bandit -ll in security.yml) ─────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "backend/", "-ll"]
        pass_filenames: false

  # ── Secret scan (mirrors gitleaks-action in security.yml) ──────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.0
    hooks:
      - id: gitleaks

  # ── Frontend: ESLint (security, hooks, complexity, React Query) ─────────────
  # mirrors "ESLint security rules" and "static-analysis" jobs in CI
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        language: system
        entry: npm
        args: [--prefix, frontend, run, lint]
        pass_filenames: false
        files: ^frontend/.*\.[jt]sx?$
