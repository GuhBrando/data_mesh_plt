services:
  db:
    image: postgres:16.1
    container_name: postgres_db
    restart: always
    volumes:
      - ./database/data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-data_mesh_plt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
      USER_PASSWORD: ${USER_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-data_mesh_plt}"]
      interval: 10s
      retries: 5

  backend:
    build: .
    container_name: backend
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_BACKEND_URL: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend

networks:
  default:
    name: data-mesh-network
