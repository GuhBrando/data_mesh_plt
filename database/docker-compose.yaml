services:
  db:
    image: postgres:16.1
    container_name: postgres_db
    restart: always
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./DDL.sql:/docker-entrypoint-initdb.d/DDL.sql
    environment:
      POSTGRES_DB: data_mesh_plt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - 5432:5432

networks:
  default:
    name: local-network
    external: true